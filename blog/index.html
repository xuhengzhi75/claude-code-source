<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>深入 Claude Code：架构解析</title>
  <link rel="stylesheet" href="style-b.css" />
  <!-- marked.js for Markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <!-- highlight.js for code syntax highlighting -->
  <link id="hljs-theme-light" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" />
  <link id="hljs-theme-dark" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" disabled />
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
  <!-- mermaid for diagrams -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="book-title">深入 Claude Code</div>
        <div class="book-subtitle">架构解析</div>
      </div>
      <nav class="toc" id="toc">
        <!-- Generated by JS -->
      </nav>
    </aside>

    <!-- Mobile overlay -->
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <!-- Main content -->
    <div class="main-wrapper">
      <header class="topbar">
        <button class="menu-btn" onclick="toggleSidebar()" aria-label="菜单">
          <span></span><span></span><span></span>
        </button>
        <span class="topbar-title" id="topbar-title">深入 Claude Code</span>
        <div class="topbar-actions">
          <button class="theme-btn" onclick="toggleTheme()" title="切换主题">☀</button>
        </div>
      </header>

      <main class="content" id="content">
        <div class="content-inner" id="content-inner">
          <div class="welcome">
            <h1>深入 Claude Code：架构解析</h1>
            <p>从源码视角理解 Claude Code 的设计哲学与工程实现。</p>
            <p>请从左侧目录选择章节开始阅读。</p>
          </div>
        </div>
      </main>

      <footer class="footer">
        <div class="footer-nav">
          <button class="nav-btn" id="prev-btn" onclick="navigatePrev()" style="display:none">← 上一章</button>
          <button class="nav-btn" id="next-btn" onclick="navigateNext()" style="display:none">下一章 →</button>
        </div>
      </footer>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
