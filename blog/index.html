<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>深入 Claude Code：架构解析</title>
  <!-- 阅读进度条 -->
  <style>
    #read-progress {
      position: fixed; top: 0; left: 0; z-index: 9999;
      height: 3px; width: 0%;
      background: linear-gradient(90deg, #c0622a, #e07840);
      transition: width 0.1s linear;
      pointer-events: none;
    }
    [data-theme="dark"] #read-progress {
      background: linear-gradient(90deg, #e07840, #f0a060);
    }
  </style>
  <link rel="stylesheet" href="style-b.css" />
  <!-- marked.js for Markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <!-- highlight.js 核心库 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <!-- mermaid for diagrams -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
  <!-- 代码高亮主题（内联，完全可控）
       正文代码块：.md-body 前缀
         light 模式 → GitHub Light
         dark  模式 → GitHub Dark
       源码面板：.anchor-panel 前缀 → Atom One Dark（始终深色）
  -->
  <style id="hljs-themes">
    /* ── 正文 light：GitHub Light ── */
    .md-body .hljs                                                    { color:#24292e; }
    .md-body .hljs-doctag,.md-body .hljs-keyword,
    .md-body .hljs-meta .hljs-keyword,.md-body .hljs-template-tag,
    .md-body .hljs-template-variable,.md-body .hljs-type,
    .md-body .hljs-variable.language_                                 { color:#d73a49; }
    .md-body .hljs-title,.md-body .hljs-title.class_,
    .md-body .hljs-title.class_.inherited__,
    .md-body .hljs-title.function_                                    { color:#6f42c1; }
    .md-body .hljs-attr,.md-body .hljs-attribute,
    .md-body .hljs-literal,.md-body .hljs-meta,
    .md-body .hljs-number,.md-body .hljs-operator,
    .md-body .hljs-selector-attr,.md-body .hljs-selector-class,
    .md-body .hljs-selector-id,.md-body .hljs-variable               { color:#005cc5; }
    .md-body .hljs-meta .hljs-string,.md-body .hljs-regexp,
    .md-body .hljs-string                                             { color:#032f62; }
    .md-body .hljs-built_in,.md-body .hljs-symbol                    { color:#e36209; }
    .md-body .hljs-code,.md-body .hljs-comment,
    .md-body .hljs-formula                                            { color:#6a737d; }
    .md-body .hljs-name,.md-body .hljs-quote,
    .md-body .hljs-selector-pseudo,.md-body .hljs-selector-tag       { color:#22863a; }
    .md-body .hljs-subst                                              { color:#24292e; }
    .md-body .hljs-section                                            { color:#005cc5; font-weight:700; }
    .md-body .hljs-bullet                                             { color:#735c0f; }
    .md-body .hljs-emphasis                                           { color:#24292e; font-style:italic; }
    .md-body .hljs-strong                                             { color:#24292e; font-weight:700; }
    .md-body .hljs-addition                                           { color:#22863a; background:#f0fff4; }
    .md-body .hljs-deletion                                           { color:#b31d28; background:#ffeef0; }

    /* ── 正文 dark：GitHub Dark ── */
    [data-theme="dark"] .md-body .hljs                                { color:#c9d1d9; }
    [data-theme="dark"] .md-body .hljs-doctag,
    [data-theme="dark"] .md-body .hljs-keyword,
    [data-theme="dark"] .md-body .hljs-meta .hljs-keyword,
    [data-theme="dark"] .md-body .hljs-template-tag,
    [data-theme="dark"] .md-body .hljs-template-variable,
    [data-theme="dark"] .md-body .hljs-type,
    [data-theme="dark"] .md-body .hljs-variable.language_            { color:#ff7b72; }
    [data-theme="dark"] .md-body .hljs-title,
    [data-theme="dark"] .md-body .hljs-title.class_,
    [data-theme="dark"] .md-body .hljs-title.class_.inherited__,
    [data-theme="dark"] .md-body .hljs-title.function_               { color:#d2a8ff; }
    [data-theme="dark"] .md-body .hljs-attr,
    [data-theme="dark"] .md-body .hljs-attribute,
    [data-theme="dark"] .md-body .hljs-literal,
    [data-theme="dark"] .md-body .hljs-meta,
    [data-theme="dark"] .md-body .hljs-number,
    [data-theme="dark"] .md-body .hljs-operator,
    [data-theme="dark"] .md-body .hljs-selector-attr,
    [data-theme="dark"] .md-body .hljs-selector-class,
    [data-theme="dark"] .md-body .hljs-selector-id,
    [data-theme="dark"] .md-body .hljs-variable                      { color:#79c0ff; }
    [data-theme="dark"] .md-body .hljs-meta .hljs-string,
    [data-theme="dark"] .md-body .hljs-regexp,
    [data-theme="dark"] .md-body .hljs-string                        { color:#a5d6ff; }
    [data-theme="dark"] .md-body .hljs-built_in,
    [data-theme="dark"] .md-body .hljs-symbol                        { color:#ffa657; }
    [data-theme="dark"] .md-body .hljs-code,
    [data-theme="dark"] .md-body .hljs-comment,
    [data-theme="dark"] .md-body .hljs-formula                       { color:#8b949e; }
    [data-theme="dark"] .md-body .hljs-name,
    [data-theme="dark"] .md-body .hljs-quote,
    [data-theme="dark"] .md-body .hljs-selector-pseudo,
    [data-theme="dark"] .md-body .hljs-selector-tag                  { color:#7ee787; }
    [data-theme="dark"] .md-body .hljs-subst                         { color:#c9d1d9; }
    [data-theme="dark"] .md-body .hljs-section                       { color:#1f6feb; font-weight:700; }
    [data-theme="dark"] .md-body .hljs-bullet                        { color:#f2cc60; }
    [data-theme="dark"] .md-body .hljs-emphasis                      { color:#c9d1d9; font-style:italic; }
    [data-theme="dark"] .md-body .hljs-strong                        { color:#c9d1d9; font-weight:700; }
    [data-theme="dark"] .md-body .hljs-addition                      { color:#aff5b4; background:#033a16; }
    [data-theme="dark"] .md-body .hljs-deletion                      { color:#ffdcd7; background:#67060c; }

    /* ── 源码面板：Atom One Dark（始终深色）── */
    .anchor-panel .hljs                                               { color:#abb2bf; background:transparent; }
    .anchor-panel .hljs-comment,.anchor-panel .hljs-quote            { color:#5c6370; font-style:italic; }
    .anchor-panel .hljs-doctag,.anchor-panel .hljs-formula,
    .anchor-panel .hljs-keyword                                       { color:#c678dd; }
    .anchor-panel .hljs-deletion,.anchor-panel .hljs-name,
    .anchor-panel .hljs-section,.anchor-panel .hljs-selector-tag,
    .anchor-panel .hljs-subst                                         { color:#e06c75; }
    .anchor-panel .hljs-literal                                       { color:#56b6c2; }
    .anchor-panel .hljs-addition,.anchor-panel .hljs-attribute,
    .anchor-panel .hljs-meta .hljs-string,.anchor-panel .hljs-regexp,
    .anchor-panel .hljs-string                                        { color:#98c379; }
    .anchor-panel .hljs-attr,.anchor-panel .hljs-number,
    .anchor-panel .hljs-selector-attr,.anchor-panel .hljs-selector-class,
    .anchor-panel .hljs-selector-pseudo,.anchor-panel .hljs-template-variable,
    .anchor-panel .hljs-type,.anchor-panel .hljs-variable            { color:#d19a66; }
    .anchor-panel .hljs-bullet,.anchor-panel .hljs-link,
    .anchor-panel .hljs-meta,.anchor-panel .hljs-selector-id,
    .anchor-panel .hljs-symbol,.anchor-panel .hljs-title             { color:#61aeee; }
    .anchor-panel .hljs-built_in,.anchor-panel .hljs-class .hljs-title,
    .anchor-panel .hljs-title.class_                                  { color:#e6c07b; }
    .anchor-panel .hljs-title.function_,
    .anchor-panel .hljs-function .hljs-title                         { color:#61afef; }
    .anchor-panel .hljs-emphasis                                      { font-style:italic; }
    .anchor-panel .hljs-strong                                        { font-weight:700; }
    .anchor-panel .hljs-link                                          { text-decoration:underline; }
    .anchor-panel .hljs-punctuation,.anchor-panel .hljs-operator     { color:#abb2bf; }
    .anchor-panel .hljs-params,.anchor-panel .hljs-property          { color:#abb2bf; }
    .anchor-panel .hljs-tag                                           { color:#e06c75; }
    .anchor-panel .hljs-tag .hljs-attr                                { color:#d19a66; }
    .anchor-panel .hljs-tag .hljs-name                                { color:#e06c75; }
  </style>
</head>
<body>
  <!-- 纸质噪点纹理层 -->
  <div class="texture-overlay" aria-hidden="true"></div>
  <div id="read-progress"></div>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">

        <a class="sidebar-brand" href="#" onclick="window.location.hash='';showWelcome();return false;" title="回到首页">

              <!-- 左眼：C 形弧线 -->
              <path d="M13 11 A4 4 0 1 0 13 19" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
              <!-- 右眼：C 形弧线 -->
              <path d="M21 11 A4 4 0 1 0 21 19" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
              <!-- 嘴：小弧线 -->
              <path d="M11 24 Q16 27.5 21 24" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none"/>

          <div class="brand-text">
            <div class="book-title">深入 Claude Code</div>

    <div class="main-wrapper">

          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8.354 1.146a.5.5 0 0 0-.708 0l-6 6A.5.5 0 0 0 1.5 7.5v7a.5.5 0 0 0 .5.5h4.5a.5.5 0 0 0 .5-.5v-4h3v4a.5.5 0 0 0 .5.5H14a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.146-.354L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293L8.354 1.146z"/></svg>

            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"/></svg>

      <main class="content" id="content">
        <div class="content-inner" id="content-inner">
          <div class="welcome">

            <p>从源码视角理解 Claude Code 的设计哲学与工程实现。</p>

      <footer class="footer">

  </div>

  <script src="app.js"></script>
</body>
</html>
