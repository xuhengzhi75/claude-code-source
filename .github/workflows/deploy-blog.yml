name: Deploy Blog to GitHub Pages

on:
  workflow_dispatch:  # 仅手动触发：gh workflow run deploy-blog.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate public surface
        run: |
          test -d docs/book/chapters
          test -f blog/index.html
          test -f blog/app.js
          test -f blog/style-b.css
          CHAPTER_COUNT=$(find docs/book/chapters -maxdepth 1 -name '*.md' | wc -l | tr -d ' ')
          if [ "$CHAPTER_COUNT" -eq 0 ]; then
            echo "❌ No chapter markdown files found under docs/book/chapters"
            exit 1
          fi
          for blocked in inbox status workflow excavation-tasks skills; do
            if [ -e "blog/$blocked" ]; then
              echo "❌ blog/$blocked must not be part of the public surface"
              exit 1
            fi
          done
          echo "✅ Public surface validation passed"

      - name: Build — copy chapters into blog/
        run: |
          mkdir -p blog/chapters
          cp docs/book/chapters/*.md blog/chapters/
          echo "✅ Copied $(ls blog/chapters/*.md | wc -l) chapter files"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: blog/   # 只发布 blog/ 目录

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
